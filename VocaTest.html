<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT 단어장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --card-hover: #1a2745;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eee;
    --text-dim: #8892a4;
    --correct: #2ecc71;
    --wrong: #e74c3c;
    --reveal: #f39c12;
    --star: #f1c40f;
  }

  body {
    font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    user-select: none;
  }

  /* --- 상단 헤더 --- */
  .header {
    text-align: center;
    margin-bottom: 20px;
    width: 100%;
    max-width: 800px;
  }

  .header h1 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    margin-bottom: 20px;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }

  .mode-switch {
    display: flex;
    justify-content: center;
    background: var(--card);
    padding: 6px;
    border-radius: 12px;
    margin: 0 auto 16px;
    max-width: 300px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .mode-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-weight: 700;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s;
    font-family: 'Noto Sans KR';
  }

  .mode-btn.active {
    background: var(--accent2);
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  /* --- 탭 스타일 --- */
  .day-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    width: 100%;
    max-width: 800px;
  }

  .day-btn {
    padding: 8px 16px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 700;
    transition: all 0.2s;
    font-family: 'Noto Sans KR';
  }

  .day-btn:hover {
    background: var(--card-hover);
    color: var(--text);
  }

  .day-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(233, 69, 96, 0.4);
  }

  /* --- 컨테이너 공통 --- */
  .container {
    width: 100%;
    max-width: 800px;
    display: none;
  }
  .container.active {
    display: block;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- [1] 공부 모드 스타일 --- */
  .filter-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
    padding: 0 8px;
  }

  .filter-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.9rem;
    font-weight: 600;
  }
  .filter-toggle input { accent-color: var(--star); transform: scale(1.2); }
  .filter-toggle.active { color: var(--star); }

  .study-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    padding-bottom: 40px;
  }

  .study-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative; 
    transition: transform 0.2s, border-color 0.2s;
  }
  
  .study-card:hover {
    transform: translateY(-4px);
    background: var(--card-hover);
    border-color: rgba(255,255,255,0.2);
  }

  .study-card.is-hard {
    border-color: var(--star);
    background: rgba(241, 196, 15, 0.05);
  }

  .star-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    font-size: 1.5rem;
    color: rgba(255,255,255,0.1);
    cursor: pointer;
    transition: color 0.2s;
  }
  .star-btn:hover { color: rgba(255,255,255,0.4); }
  .study-card.is-hard .star-btn { color: var(--star); }

  .sc-kanji {
    font-size: 2.2rem;
    font-weight: 900;
    font-family: 'Noto Sans JP';
    margin-bottom: 8px;
    color: #fff;
    margin-top: 10px;
  }

  .sc-hira {
    font-size: 1.1rem;
    color: var(--reveal);
    font-weight: 700;
    margin-bottom: 4px;
  }

  .sc-mean {
    font-size: 1rem;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .sc-ex {
    background: rgba(0,0,0,0.2);
    padding: 8px;
    border-radius: 8px;
    font-size: 0.8rem;
    color: #aaa;
    width: 100%;
    line-height: 1.4;
  }
  .sc-ex span { color: #ddd; display: block; margin-bottom: 2px; }

  /* --- [2] 퀴즈 모드 스타일 --- */
  .quiz-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 520px;
    margin: 0 auto;
  }

  .stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    font-size: 0.95rem;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .stats .num { font-weight: 700; color: var(--text); }
  .stats .correct-count .num { color: var(--correct); }
  .stats .wrong-count .num { color: var(--wrong); }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--accent2);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .card-container {
    width: 100%;
    perspective: 1000px;
  }

  .card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 0 32px;
    padding-top: 80px;
    text-align: center;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }
  .card:hover { background: var(--card-hover); }

  .card-hint {
    position: absolute;
    bottom: 20px;
    width: 100%;
    left: 0;
    font-size: 0.8rem;
    color: var(--text-dim);
    opacity: 0.6;
    transition: opacity 0.3s;
  }
  .card.revealed .card-hint { opacity: 0; }

  .kanji {
    font-family: 'Noto Sans JP', serif;
    font-size: 3.5rem;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 20px;
    color: #fff;
    word-break: keep-all;
  }

  .answer {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s ease, max-height 0.3s ease;
    width: 100%;
  }
  
  .card.revealed .answer {
    max-height: 300px;
    opacity: 1;
  }

  .hiragana {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--reveal);
    margin-bottom: 8px;
  }

  .meaning {
    font-size: 1.2rem;
    color: var(--text-dim);
    font-weight: 600;
  }

  .example {
    margin: 16px auto 0;
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 400px;
  }
  .example .jp { color: var(--text); font-family: 'Noto Sans JP'; display: block; margin-bottom: 4px; }

  .buttons {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    width: 100%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .buttons.visible { opacity: 1; pointer-events: auto; }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-wrong { background: rgba(231, 76, 60, 0.15); color: var(--wrong); border: 1px solid rgba(231, 76, 60, 0.3); }
  .btn-wrong:hover { background: rgba(231, 76, 60, 0.25); }
  .btn-correct { background: rgba(46, 204, 113, 0.15); color: var(--correct); border: 1px solid rgba(46, 204, 113, 0.3); }
  .btn-correct:hover { background: rgba(46, 204, 113, 0.25); }

  .result-screen {
    display: none;
    text-align: center;
    width: 100%;
  }
  .result-screen.active { display: block; }
  
  .result-score { font-size: 4rem; font-weight: 900; margin: 24px 0 8px; }
  .result-label { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 32px; }
  .result-detail { display: flex; justify-content: center; gap: 32px; margin-bottom: 32px; }
  .result-detail .big { font-size: 1.8rem; font-weight: 700; }

  .wrong-list { text-align: left; background: var(--card); border-radius: 14px; padding: 20px; margin-bottom: 24px; }
  .wrong-list h3 { font-size: 0.9rem; color: var(--wrong); margin-bottom: 12px; }
  .wrong-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
  .wrong-item:last-child { border: none; }
  .wrong-item .wi-kanji { font-family: 'Noto Sans JP'; font-weight: 700; width: 30%; }
  .wrong-item .wi-reading { color: var(--reveal); width: 30%; }
  .wrong-item .wi-meaning { color: var(--text-dim); width: 40%; text-align: right; }

  .controls { margin-top: 32px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .ctrl-btn { padding: 10px 20px; background: var(--accent2); border: 1px solid rgba(255,255,255,0.08); color: var(--text-dim); border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .ctrl-btn:hover { background: #1a3a6a; color: var(--text); }
  
  .star-quiz-btn { border-color: var(--star); color: var(--star); background: rgba(241, 196, 15, 0.1); }
  .star-quiz-btn:hover { background: rgba(241, 196, 15, 0.2); color: #fff; }

  .keyboard-hint { margin-top: 16px; font-size: 0.75rem; color: var(--text-dim); opacity: 0.5; text-align: center; }
  .keyboard-hint kbd { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
</style>
</head>
<body>

<div class="header">
  <h1>JLPT <span>단어장</span></h1>
  <div class="mode-switch" id="modeSwitch" style="display:none;">
    <button class="mode-btn active" onclick="setMode('study')" id="btnStudy">📖 공부 모드</button>
    <button class="mode-btn" onclick="setMode('quiz')" id="btnQuiz">📝 퀴즈 모드</button>
  </div>
  <div class="day-tabs" id="dayTabs" style="display:none;">
    </div>
</div>

<div id="loading" class="container active" style="text-align:center; padding-top: 50px;">
  <h2 style="color: var(--text); margin-bottom: 10px;">데이터를 불러오는 중입니다...</h2>
  <p style="color: var(--text-dim);">구글 시트에서 최신 단어장을 동기화하고 있습니다.</p>
</div>

<div id="studyContainer" class="container">
  <div class="filter-bar">
    <label class="filter-toggle">
      <input type="checkbox" id="hardFilter" onchange="renderStudyList()">
      <span>★ 어려움만 보기</span>
    </label>
  </div>
  <div class="study-grid" id="studyGrid">
    </div>
</div>

<div id="quizContainer" class="container">
  <div class="quiz-layout">
    <div class="stats">
      <div>진행: <span class="num" id="current">0</span> / <span class="num" id="total">0</span></div>
      <div class="correct-count">✓ <span class="num" id="correctCount">0</span></div>
      <div class="wrong-count">✗ <span class="num" id="wrongCount">0</span></div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="card-container" id="quizArea">
      <div class="card" id="card" onclick="revealCard()">
        <div class="kanji" id="kanji"></div>
        <div class="answer" id="answer">
          <div class="hiragana" id="hiragana"></div>
          <div class="meaning" id="meaning"></div>
          <div class="example" id="example"></div>
        </div>
        <div class="card-hint">클릭하여 정답 확인</div>
      </div>

      <div class="buttons" id="buttons">
        <button class="btn btn-wrong" onclick="markAnswer(false)">몰랐어 ✗</button>
        <button class="btn btn-correct" onclick="markAnswer(true)">알았어 ✓</button>
      </div>

      <div class="keyboard-hint">
        <kbd>Space</kbd> 정답 확인 &nbsp; <kbd>←</kbd> 몰랐어 &nbsp; <kbd>→</kbd> 알았어
      </div>
    </div>

    <div class="result-screen" id="resultScreen">
      <h2>테스트 완료!</h2>
      <div class="result-score" id="resultScore"></div>
      <div class="result-label" id="resultLabel"></div>
      <div class="result-detail">
        <div><div class="big" style="color:var(--correct)" id="finalCorrect">0</div>맞음</div>
        <div><div class="big" style="color:var(--wrong)" id="finalWrong">0</div>틀림</div>
        <div><div class="big" id="finalTotal">0</div>전체</div>
      </div>
      <div class="wrong-list" id="wrongList" style="display:none">
        <h3>✗ 틀린 단어 복습</h3>
        <div id="wrongItems"></div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="startQuiz()">🔄 전체 다시</button>
        <button class="ctrl-btn" onclick="retryWrong()">🔁 틀린 것만 다시</button>
      </div>
    </div>
    
    <div class="controls" id="mainControls" style="margin-top:20px;">
        <button class="ctrl-btn" onclick="startQuiz()">🔀 조건 랜덤 퀴즈</button>
        <button class="ctrl-btn star-quiz-btn" onclick="startHardQuiz()">★ 어려운 단어만 퀴즈</button>
    </div>
  </div>
</div>

<script>
// 보안 정책(CORS)을 100% 우회하는 JSONP 방식 사용
const SHEET_ID = '1Moj1MM-s7BO_UBmvZNQIBXbxfWCUVWS0D77lX2rEPWg';
const GID = '734089437';
const JSONP_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&callback=handleSheetData`;

const STORAGE_KEY = 'jp_vocab_dynamic_hard_v2';

let allWords = [];
let words = [];
let currentDay = 'all';
let daysAvailable = [];

let idx = 0;
let correct = 0;
let wrong = 0;
let revealed = false;
let wrongWords = [];
let currentMode = 'study'; 
let hardWords = new Set(); 

// 페이지가 열리면 시트에서 스크립트를 가져와 실행함
window.onload = () => {
  const script = document.createElement('script');
  script.src = JSONP_URL;
  
  // 만약 스크립트 로드 자체가 실패했을 경우
  script.onerror = () => {
    showLoadError();
  };
  
  document.body.appendChild(script);
};

// JSONP 콜백 함수 (구글 시트 데이터가 도착하면 자동 실행됨)
function handleSheetData(response) {
  try {
    const rows = response.table.rows;
    const data = [];
    
    rows.forEach(row => {
      const c = row.c;
      if (!c || !c[0]) return;
      
      let dayVal = c[0].v !== null ? String(c[0].v) : '';
      if (dayVal === 'Day' || dayVal === 'DAY' || dayVal === '') return; // 헤더나 빈칸 무시
      
      let kanji = c[1] && c[1].v !== null ? String(c[1].v) : '';
      let hira = c[2] && c[2].v !== null ? String(c[2].v) : '';
      
      if (kanji === '-' || kanji === '') {
        kanji = hira;
        hira = '';
      } else if (hira === '-') {
        hira = '';
      }
      
      const uniqueId = `w_${kanji}_${hira}`;
      
      data.push({
        id: uniqueId,
        day: dayVal,
        kanji: kanji,
        hira: hira,
        mean: c[3] && c[3].v !== null ? String(c[3].v) : '',
        ex: c[4] && c[4].v !== null ? String(c[4].v) : '',
        exKr: c[5] && c[5].v !== null ? String(c[5].v) : ''
      });
    });
    
    allWords = data;
    
    if(allWords.length === 0) {
      showLoadError("데이터를 찾을 수 없습니다.");
      return;
    }

    loadHardStatus();
    extractDays();
    
    document.getElementById('modeSwitch').style.display = '';
    document.getElementById('dayTabs').style.display = '';
    
    setMode('study'); 
  } catch (err) {
    console.error(err);
    showLoadError();
  }
}

function showLoadError(msg = "인터넷 연결을 확인하거나 잠시 후 다시 시도해주세요.") {
  document.getElementById('loading').innerHTML = `
    <h2 style="color: var(--wrong);">데이터 로드 실패 😢</h2>
    <p style="color: var(--text-dim); margin-top:10px;">${msg}</p>
  `;
}

function extractDays() {
  const days = new Set(allWords.map(w => w.day));
  daysAvailable = Array.from(days).sort((a,b) => {
    const numA = parseInt(a);
    const numB = parseInt(b);
    if(isNaN(numA) || isNaN(numB)) return a > b ? 1 : -1;
    return numA - numB;
  });
  
  const tabsContainer = document.getElementById('dayTabs');
  tabsContainer.innerHTML = `<button class="day-btn active" onclick="setDay('all')" id="day-all">전체</button>`;
  
  daysAvailable.forEach(d => {
    tabsContainer.innerHTML += `<button class="day-btn" onclick="setDay('${d}')" id="day-${d}">Day ${d}</button>`;
  });
}

function getFilteredWords() {
  if (currentDay === 'all') return allWords;
  return allWords.filter(w => String(w.day) === String(currentDay));
}

function setDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`day-${day}`).classList.add('active');
  
  if (currentMode === 'study') {
    renderStudyList();
  } else {
    startQuiz();
  }
}

function loadHardStatus() {
  const data = localStorage.getItem(STORAGE_KEY);
  if(data) {
    const arr = JSON.parse(data);
    hardWords = new Set(arr);
  }
}

function toggleHard(id) {
  if (hardWords.has(id)) {
    hardWords.delete(id);
  } else {
    hardWords.add(id);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...hardWords]));
  renderStudyList(); 
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
  
  document.getElementById('loading').classList.remove('active');

  if(mode === 'study') {
    document.getElementById('btnStudy').classList.add('active');
    document.getElementById('studyContainer').classList.add('active');
    renderStudyList();
  } else {
    document.getElementById('btnQuiz').classList.add('active');
    document.getElementById('quizContainer').classList.add('active');
    startQuiz();
  }
}

function renderStudyList() {
  const grid = document.getElementById('studyGrid');
  const onlyHard = document.getElementById('hardFilter').checked;
  grid.innerHTML = ''; 

  const filteredWords = getFilteredWords();

  filteredWords.forEach(w => {
    const isHard = hardWords.has(w.id);
    if (onlyHard && !isHard) return;

    const card = document.createElement('div');
    card.className = `study-card ${isHard ? 'is-hard' : ''}`;
    card.innerHTML = `
      <button class="star-btn" onclick="toggleHard('${w.id}')">
        ${isHard ? '★' : '☆'}
      </button>
      <div class="sc-kanji">${w.kanji}</div>
      <div class="sc-hira">${w.hira}</div>
      <div class="sc-mean">${w.mean}</div>
      ${w.ex ? `
      <div class="sc-ex">
        <span class="jp">${w.ex}</span>
        ${w.exKr}
      </div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(subset) {
  const baseWords = subset || getFilteredWords();
  words = shuffle([...baseWords]);
  
  if (words.length === 0) {
      alert("해당 조건의 단어가 없습니다.");
      setMode('study');
      return;
  }
  initQuiz();
}

function startHardQuiz() {
  const baseWords = getFilteredWords();
  const hards = baseWords.filter(w => hardWords.has(w.id));
  if(hards.length === 0) {
    alert("별표(★)로 체크한 단어가 없습니다. 해당 Day의 공부 모드에서 단어를 먼저 체크해주세요.");
    return;
  }
  words = shuffle([...hards]);
  initQuiz();
}

function initQuiz() {
  idx = 0; correct = 0; wrong = 0; wrongWords = [];
  revealed = false;
  document.getElementById('resultScreen').classList.remove('active');
  document.getElementById('quizArea').style.display = '';
  document.getElementById('mainControls').style.display = '';
  updateView();
}

function updateView() {
  document.getElementById('total').textContent = words.length;
  document.getElementById('current').textContent = idx + 1;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  
  const pct = words.length > 0 ? (idx / words.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  const w = words[idx];
  document.getElementById('kanji').textContent = w.kanji;
  document.getElementById('hiragana').textContent = w.hira;
  document.getElementById('meaning').textContent = w.mean;
  
  if (w.ex) {
      document.getElementById('example').innerHTML = `<span class="jp">${w.ex}</span><br>${w.exKr}`;
      document.getElementById('example').style.display = 'block';
  } else {
      document.getElementById('example').style.display = 'none';
  }

  document.getElementById('card').classList.remove('revealed');
  document.getElementById('buttons').classList.remove('visible');
  revealed = false;
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  document.getElementById('card').classList.add('revealed');
  document.getElementById('buttons').classList.add('visible');
}

function markAnswer(isCorrect) {
  if (!revealed) return;

  document.getElementById('card').classList.remove('revealed');
  document.getElementById('buttons').classList.remove('visible');
  revealed = false; 
  
  const currentWord = words[idx];

  if (isCorrect) {
    correct++;
  } else {
    wrong++;
    wrongWords.push(currentWord);
    
    if (!hardWords.has(currentWord.id)) {
      hardWords.add(currentWord.id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...hardWords]));
    }
  }
  idx++;

  setTimeout(() => {
    if (idx >= words.length) {
      showResult();
    } else {
      updateView();
    }
  }, 300);
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('mainControls').style.display = 'none';
  const screen = document.getElementById('resultScreen');
  screen.classList.add('active');

  const pct = words.length > 0 ? Math.round((correct / words.length) * 100) : 0;
  document.getElementById('resultScore').textContent = pct + '%';
  document.getElementById('resultScore').style.color =
    pct >= 80 ? 'var(--correct)' : pct >= 50 ? 'var(--reveal)' : 'var(--wrong)';

  let label = pct === 100 ? '완벽해요! 🎉' : pct >= 80 ? '잘했어요! 👏' : pct >= 50 ? '조금만 더! 💪' : '복습이 필요해요 📖';
  document.getElementById('resultLabel').textContent = label;
  document.getElementById('finalCorrect').textContent = correct;
  document.getElementById('finalWrong').textContent = wrong;
  document.getElementById('finalTotal').textContent = words.length;

  const wl = document.getElementById('wrongList');
  const wi = document.getElementById('wrongItems');
  if (wrongWords.length > 0) {
    wl.style.display = 'block';
    wi.innerHTML = wrongWords.map(w =>
      `<div class="wrong-item">
        <span class="wi-kanji">${w.kanji}</span>
        <span class="wi-reading">${w.hira}</span>
        <span class="wi-meaning">${w.mean}</span>
      </div>`
    ).join('');
  } else {
    wl.style.display = 'none';
  }
}

function retryWrong() {
  if (wrongWords.length === 0) { startQuiz(); return; }
  startQuiz(wrongWords);
}

document.addEventListener('keydown', e => {
  if (currentMode !== 'quiz') return;
  if (e.code === 'Space') { e.preventDefault(); revealCard(); }
  if (e.code === 'ArrowRight' && revealed) markAnswer(true);
  if (e.code === 'ArrowLeft' && revealed) markAnswer(false);
});

</script>
</body>
</html>
